name: diffsoup
channels:
  - conda-forge
  - defaults
  - nvidia

dependencies:
  - python=3.11
  - pip
  - cmake>=3.20
  - ninja
  - nvidia::cuda-toolkit=13.0
  # Keep the numerical stack on defaults/Intel OpenMP on Windows. PyTorch
  # wheels ship libiomp5md.dll and can conflict with conda-forge libomp.dll.
  - defaults::intel-openmp
  - defaults::numpy
  - defaults::scipy
  - defaults::imageio
  - defaults::matplotlib
  - defaults::tqdm
  - trimesh
  - defaults::scikit-image
  - pillow
  - pyqt
  - pyopengl
  - scikit-build-core>=0.11.6
  - nanobind>=2.11.0

  - pip:
      - --index-url https://download.pytorch.org/whl/cu130
      - --extra-index-url https://pypi.org/simple
      - torch
      - torchvision
      - pytorch-msssim
      - lpips
      - open3d
      - glad2>=2.0.0

variables:
  PYTHONNOUSERSITE: "1"
