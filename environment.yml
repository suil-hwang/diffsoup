name: diffsoup
channels:
  - conda-forge
  - nvidia

dependencies:
  - python=3.11
  - pip
  - cmake>=3.20
  - ninja
  - nvidia::cuda-toolkit=13.0
  - numpy
  - scipy
  - imageio
  - matplotlib
  - tqdm
  - open3d
  - trimesh
  - scikit-image
  - pillow
  - pyqt
  - pyopengl
  - scikit-build-core>=0.11.6
  - nanobind>=2.11.0

  - pip:
      - --index-url https://download.pytorch.org/whl/cu130
      - --extra-index-url https://pypi.org/simple
      - torch
      - torchvision
      - pytorch-msssim
      - lpips
      - glad2>=2.0.0
